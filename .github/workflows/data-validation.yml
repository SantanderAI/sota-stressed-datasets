#
# Structural validation of every published dataset. Runs the stdlib-only
# validator in .github/scripts/validate_dataset.py — valid JSONL, required
# keys, label domain, unique ids, and (when declared) record count and
# label-distribution checks.

name: Data validation

on:
  push:
    branches: [main, development]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate dataset files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Validate datasets
        run: python .github/scripts/validate_dataset.py
