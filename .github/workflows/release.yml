#
# Release packaging. This collection is distributed as data (cloned or
# downloaded). On a published GitHub Release this workflow builds a versioned
# source archive of the data + documentation and attaches it to the release.

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  archive:
    name: Build + attach source archive
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to upload the release asset
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Build source archive
        run: |
          set -euo pipefail
          NAME="sota-stressed-datasets-${GITHUB_REF_NAME:-dev}"
          mkdir -p dist
          tar --exclude-vcs \
              --exclude='./dist' \
              --exclude='./.github' \
              -czf "dist/${NAME}.tar.gz" .
          (cd dist && sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256")
          ls -l dist

      - name: Upload archive as workflow artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: source-archive
          path: dist/

      - name: Attach archive to the GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
